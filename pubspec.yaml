name: focus_dungeon
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0 # Çift tanımlama kaldırıldı, güncel sürüm bırakıldı
  provider: ^6.1.5+1
  sensors_plus: ^7.0.0
  http: ^1.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/app_icon.png
    - assets/images/archer.png
    - assets/images/mage.png
    - assets/images/warrior.png